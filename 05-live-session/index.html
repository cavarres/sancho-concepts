<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sancho — Your AI Right Hand</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d0d0d;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Full bleed background ── */
    .bg-photo {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: blur(6px) brightness(0.6) saturate(1.1);
      transform: scale(1.04); /* hide blur edge */
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
    }

    /* ── Film grain SVG overlay ── */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.032;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
      background-repeat: repeat;
    }

    /* ── Wordmark ── */
    .wordmark {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* ── Telegram window ── */
    .tg-window {
      position: relative;
      z-index: 5;
      width: 400px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.7),
        0 4px 16px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.06);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      background: rgba(18, 18, 18, 0.93);
    }

    /* ── TG Header ── */
    .tg-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 12px 14px;
      background: rgba(30, 30, 30, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .tg-back {
      color: #2AABEE;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      margin-right: 2px;
      opacity: 0.9;
    }

    .tg-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2b5278 0%, #1a3a5c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
      position: relative;
    }

    .tg-avatar::after {
      content: '';
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4dcd5e;
      border: 2px solid rgba(30, 30, 30, 0.95);
    }

    .tg-header-info {
      flex: 1;
      min-width: 0;
    }

    .tg-name-row {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .tg-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.5s ease;
    }

    /* Telegram verified tick */
    .tg-verified {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .tg-status {
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
      transition: opacity 0.5s ease;
    }

    .tg-status.online {
      color: #4dcd5e;
    }

    .tg-header-actions {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .tg-icon-btn {
      color: rgba(255,255,255,0.55);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    /* ── Chat body ── */
    .tg-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-height: 340px;
      max-height: 440px;
      scroll-behavior: smooth;
    }

    .tg-body::-webkit-scrollbar { display: none; }

    /* Date divider */
    .tg-date-divider {
      display: flex;
      justify-content: center;
      margin: 6px 0 10px;
    }

    .tg-date-pill {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      backdrop-filter: blur(8px);
    }

    /* Message rows */
    .tg-msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .tg-msg-row.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tg-msg-row.from-sancho {
      justify-content: flex-start;
    }

    .tg-msg-row.from-user {
      justify-content: flex-end;
    }

    /* Sancho's mini avatar */
    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2b5278 0%, #1a3a5c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
      margin-bottom: 0;
    }

    .msg-avatar.invisible {
      visibility: hidden;
    }

    /* Bubbles */
    .tg-bubble {
      max-width: 78%;
      padding: 7px 10px 5px;
      border-radius: 12px;
      position: relative;
      word-break: break-word;
    }

    .tg-bubble.incoming {
      background: #2b2b2b;
      border-bottom-left-radius: 4px;
    }

    .tg-bubble.outgoing {
      background: #2b5278;
      border-bottom-right-radius: 4px;
    }

    .tg-bubble-text {
      font-size: 15px;
      line-height: 1.5;
      color: #fff;
      font-weight: 400;
    }

    .tg-bubble-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-top: 3px;
    }

    .tg-time {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
    }

    /* Outgoing read ticks */
    .tg-ticks {
      font-size: 14px;
      color: #4fc3f7;
      line-height: 1;
    }

    /* ── Thinking / typing indicator ── */
    .tg-typing-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .tg-typing-row.visible {
      opacity: 1;
    }

    .tg-typing-bubble {
      background: #2b2b2b;
      border-radius: 12px;
      border-bottom-left-radius: 4px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      animation: none;
    }

    .tg-typing-row.active .typing-dot:nth-child(1) {
      animation: tgPulse 1s ease-in-out infinite 0ms;
    }
    .tg-typing-row.active .typing-dot:nth-child(2) {
      animation: tgPulse 1s ease-in-out infinite 200ms;
    }
    .tg-typing-row.active .typing-dot:nth-child(3) {
      animation: tgPulse 1s ease-in-out infinite 400ms;
    }

    @keyframes tgPulse {
      0%, 100% { opacity: 0.3; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    /* ── TG Input bar ── */
    .tg-input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: rgba(24, 24, 24, 0.98);
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .tg-emoji-btn {
      color: rgba(255,255,255,0.3);
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .tg-input-field {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border: none;
      border-radius: 22px;
      padding: 8px 14px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      color: #fff;
      outline: none;
      caret-color: #2AABEE;
      transition: background 0.2s;
    }

    .tg-input-field::placeholder {
      color: rgba(255,255,255,0.28);
    }

    .tg-input-field:focus {
      background: rgba(255,255,255,0.1);
    }

    .tg-send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #2AABEE;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }

    .tg-send-btn:hover {
      background: #3ab8f8;
    }

    .tg-send-btn svg {
      fill: #fff;
      width: 18px;
      height: 18px;
      transform: translateX(1px);
    }

    /* ── Name input phase: hidden until transition ── */
    .name-phase.visible {
      opacity: 1;
    }

    /* ── "Who are you?" in chat ── */
    .tg-system-msg {
      display: flex;
      justify-content: center;
      margin: 8px 0;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .tg-system-msg.visible {
      opacity: 1;
    }

    .tg-system-pill {
      background: rgba(43, 82, 120, 0.35);
      border: 1px solid rgba(43, 82, 120, 0.5);
      border-radius: 14px;
      padding: 4px 14px;
      font-size: 12.5px;
      color: rgba(255,255,255,0.65);
    }

    /* ── CTA ── */
    .tg-cta {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.8s ease;
      text-align: center;
      white-space: nowrap;
    }

    .tg-cta.visible {
      opacity: 1;
    }

    .tg-cta-link {
      display: inline-block;
      background: #2AABEE;
      color: #fff;
      text-decoration: none;
      font-size: 13.5px;
      font-weight: 500;
      letter-spacing: 0.02em;
      padding: 11px 28px;
      border-radius: 22px;
      box-shadow: 0 4px 20px rgba(42, 171, 238, 0.4);
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .tg-cta-link:hover {
      box-shadow: 0 6px 28px rgba(42, 171, 238, 0.55);
      transform: translateY(-1px);
    }

    .tg-cta-sub {
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-photo">
    <img src="bg.jpg" alt="" />
  </div>
  <div class="vignette"></div>
  <div class="grain"></div>

  <!-- Wordmark -->
  <div class="wordmark">Sancho</div>

  <!-- Telegram window -->
  <div class="tg-window">

    <!-- Header -->
    <div class="tg-header">
      <div class="tg-back">‹</div>
      <div class="tg-avatar" id="headerAvatar">S</div>
      <div class="tg-header-info">
        <div class="tg-name-row">
          <span class="tg-name" id="headerName">Sancho</span>
          <!-- Telegram verified badge -->
          <svg class="tg-verified" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="8" fill="#2AABEE"/>
            <path d="M5 8.5L7 10.5L11 6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="tg-status online" id="headerStatus">online</div>
      </div>
      <div class="tg-header-actions">
        <span class="tg-icon-btn">⋯</span>
      </div>
    </div>

    <!-- Chat body -->
    <div class="tg-body" id="tgBody">
      <div class="tg-date-divider">
        <div class="tg-date-pill" id="datePill">Today</div>
      </div>
      <!-- Messages injected here -->

      <!-- Typing indicator -->
      <div class="tg-typing-row" id="typingRow">
        <div class="msg-avatar">S</div>
        <div class="tg-typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>

      <!-- System message for name prompt -->
      <div class="tg-system-msg" id="systemMsg">
        <div class="tg-system-pill">Your turn — what's your name?</div>
      </div>
    </div>

    <!-- Input bar -->
    <div class="tg-input-bar">
      <span class="tg-emoji-btn">☺</span>
      <input
        type="text"
        class="tg-input-field name-phase"
        id="nameInput"
        placeholder="Your name..."
        autocomplete="off"
        spellcheck="false"
        maxlength="32"
        style="display:none;"
      />
      <div class="tg-input-field" id="demoInputPlaceholder" style="color: rgba(255,255,255,0.28); pointer-events:none;">Message</div>
      <button class="tg-send-btn" id="sendBtn" style="display:none;" onclick="handleSend()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
      <button class="tg-send-btn" id="micBtn" style="background: rgba(255,255,255,0.1);">
        <svg viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 15.2 14.47 17 12 17s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V21c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- CTA -->
  <div class="tg-cta" id="cta">
    <a class="tg-cta-link" href="#">Start with Sancho on Telegram</a>
    <div class="tg-cta-sub">No setup. Just open a chat.</div>
  </div>

  <script>
    // ── Helpers ────────────────────────────────────────────────────────────
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    function nowTime() {
      return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function getGreeting() {
      const h = new Date().getHours();
      if (h >= 5 && h < 12) return 'morning';
      if (h >= 12 && h < 17) return 'afternoon';
      if (h >= 17 && h < 21) return 'evening';
      return 'night';
    }

    function getTimeContext() {
      const h = new Date().getHours();
      if (h < 9) return 'early in the day';
      if (h < 12) return 'mid-morning';
      if (h < 14) return 'around midday';
      if (h < 17) return 'this afternoon';
      if (h < 20) return 'this evening';
      return 'tonight';
    }

    // ── DOM refs ──────────────────────────────────────────────────────────
    const body        = document.getElementById('tgBody');
    const typingRow   = document.getElementById('typingRow');
    const systemMsg   = document.getElementById('systemMsg');
    const nameInput   = document.getElementById('nameInput');
    const demoPlaceholder = document.getElementById('demoInputPlaceholder');
    const sendBtn     = document.getElementById('sendBtn');
    const micBtn      = document.getElementById('micBtn');
    const headerName  = document.getElementById('headerName');
    const headerStatus= document.getElementById('headerStatus');
    const headerAvatar= document.getElementById('headerAvatar');
    const cta         = document.getElementById('cta');

    let phase = 'demo';

    // ── Insert message ─────────────────────────────────────────────────────
    function createMsgRow(role, text, showAvatar = true) {
      const row = document.createElement('div');
      row.className = `tg-msg-row from-${role}`;

      if (role === 'sancho') {
        const av = document.createElement('div');
        av.className = showAvatar ? 'msg-avatar' : 'msg-avatar invisible';
        av.textContent = 'S';
        row.appendChild(av);
      }

      const bubble = document.createElement('div');
      bubble.className = `tg-bubble ${role === 'sancho' ? 'incoming' : 'outgoing'}`;

      const txt = document.createElement('div');
      txt.className = 'tg-bubble-text';
      txt.textContent = text;

      const meta = document.createElement('div');
      meta.className = 'tg-bubble-meta';

      const time = document.createElement('span');
      time.className = 'tg-time';
      time.textContent = nowTime();
      meta.appendChild(time);

      if (role === 'user') {
        const ticks = document.createElement('span');
        ticks.className = 'tg-ticks';
        ticks.textContent = '✓✓';
        meta.appendChild(ticks);
      }

      bubble.appendChild(txt);
      bubble.appendChild(meta);
      row.appendChild(bubble);

      return row;
    }

    async function appendMsg(role, text, thinkingMs = 0) {
      if (thinkingMs > 0) {
        // update header status
        headerStatus.textContent = 'typing...';
        headerStatus.classList.remove('online');

        typingRow.classList.add('visible', 'active');
        body.appendChild(typingRow); // move to bottom
        body.scrollTop = body.scrollHeight;

        await sleep(thinkingMs);

        typingRow.classList.remove('visible', 'active');
        headerStatus.textContent = 'online';
        headerStatus.classList.add('online');
        await sleep(80);
      }

      const row = createMsgRow(role, text);
      // Insert before the typing row (which is now at bottom) so message lands above it
      body.insertBefore(row, typingRow);

      void row.offsetWidth;
      row.classList.add('visible');
      body.scrollTop = body.scrollHeight;

      return row;
    }

    // ── Demo sequence ──────────────────────────────────────────────────────
    async function runDemo() {
      await sleep(1000);

      await appendMsg('user', 'Can you check if my dentist appointment on Friday conflicts with anything?');
      await sleep(500);

      await appendMsg('sancho', 'It does — you have a standing 1:1 with the design team at 3pm. Want me to move the dentist to next Tuesday? There\'s a 10am slot.', 1400);
      await sleep(700);

      await appendMsg('user', 'Yes please. Also I need to prep for the board meeting');
      await sleep(500);

      await appendMsg('sancho', 'Done. Dentist moved. For the board meeting — I\'ve pulled the last three board decks and the Q4 targets. Give me 20 minutes and I\'ll have a one-pager ready.', 1800);

      await sleep(3000);

      await runTransition();
    }

    // ── Transition ─────────────────────────────────────────────────────────
    async function runTransition() {
      phase = 'transition';

      // Fade demo placeholder, show name input
      demoPlaceholder.style.transition = 'opacity 0.5s ease';
      demoPlaceholder.style.opacity = '0';
      await sleep(500);
      demoPlaceholder.style.display = 'none';

      // Show system message in chat
      body.appendChild(systemMsg);
      body.scrollTop = body.scrollHeight;
      await sleep(80);
      systemMsg.classList.add('visible');

      await sleep(400);

      // Activate name input
      nameInput.style.display = '';
      nameInput.classList.add('visible');
      sendBtn.style.display = 'flex';
      micBtn.style.display = 'none';
      nameInput.focus();

      phase = 'input';
    }

    // ── Name entry ─────────────────────────────────────────────────────────
    async function handleNameEntry(name) {
      if (phase !== 'input') return;
      phase = 'response';

      nameInput.disabled = true;
      sendBtn.style.display = 'none';

      // Append user's intro message
      const trimmed = name.trim();
      await appendMsg('user', `Hi — I'm ${trimmed}`);
      await sleep(300);

      // THE 1.8s STILLNESS
      const firstName = trimmed.split(' ')[0];

      headerStatus.textContent = 'typing...';
      headerStatus.classList.remove('online');
      typingRow.classList.add('visible', 'active');
      body.appendChild(typingRow);
      body.scrollTop = body.scrollHeight;

      await sleep(1800);

      typingRow.classList.remove('visible', 'active');
      headerStatus.textContent = 'online';
      headerStatus.classList.add('online');
      await sleep(80);

      const greeting = getGreeting();
      const timeCtx = getTimeContext();
      const personalizedText = `Good ${greeting}, ${firstName}. I'm here. It's ${timeCtx} — tell me what's on your plate and I'll start clearing it.`;

      const row = createMsgRow('sancho', personalizedText);
      body.insertBefore(row, typingRow);
      void row.offsetWidth;
      row.classList.add('visible');
      body.scrollTop = body.scrollHeight;

      await sleep(1400);
      cta.classList.add('visible');
    }

    function handleSend() {
      const val = nameInput.value.trim();
      if (val.length > 0) handleNameEntry(val);
    }

    // ── Input listeners ────────────────────────────────────────────────────
    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const val = nameInput.value.trim();
        if (val.length > 0) handleNameEntry(val);
      }
    });

    // ── Boot ───────────────────────────────────────────────────────────────
    window.addEventListener('load', runDemo);
  </script>
</body>
</html>
