<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sancho — Two versions of today.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --split: 50%;
      --glow-color: rgba(255, 255, 255, 0.55);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: 'Inter', sans-serif;
      cursor: none;
      user-select: none;
    }

    /* ── SVG FILM GRAIN FILTER ────────────────────────── */
    #grain-filter {
      position: fixed;
      width: 0;
      height: 0;
      pointer-events: none;
    }

    /* ── CUSTOM CURSOR ────────────────────────────────── */
    #cursor-line {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 1px;
      pointer-events: none;
      z-index: 200;
      transform: translateX(-50%);
      /* The glow divider line */
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(255,255,255,0.0) 5%,
        rgba(255,255,255,0.6) 30%,
        rgba(255,255,255,0.8) 50%,
        rgba(255,255,255,0.6) 70%,
        rgba(255,255,255,0.0) 95%,
        transparent 100%
      );
      box-shadow: 0 0 8px 1px rgba(255,255,255,0.25), 0 0 24px 2px rgba(255,255,255,0.08);
    }

    #cursor-dot {
      position: fixed;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.5);
      pointer-events: none;
      z-index: 201;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
      background: rgba(255,255,255,0.04);
    }

    #cursor-dot::before,
    #cursor-dot::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 6px;
      height: 1px;
      background: rgba(255,255,255,0.7);
    }

    #cursor-dot::before {
      right: calc(50% + 2px);
      transform: translateX(-1px);
    }

    #cursor-dot::after {
      left: calc(50% + 2px);
      transform: translateX(1px);
    }

    /* ── SCENE WRAPPER ────────────────────────────────── */
    #scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ── VIDEO LAYERS ─────────────────────────────────── */
    .video-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Clip paths driven by CSS variable --split */
    #video-left {
      clip-path: polygon(0 0, var(--split) 0, var(--split) 100%, 0 100%);
    }

    #video-right {
      clip-path: polygon(var(--split) 0, 100% 0, 100% 100%, var(--split) 100%);
    }

    /* ── FILM GRAIN OVERLAY ───────────────────────────── */
    #grain-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      opacity: 0.45;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      mix-blend-mode: overlay;
      animation: grain-shift 0.08s steps(1) infinite;
    }

    @keyframes grain-shift {
      0%   { background-position: 0 0; }
      10%  { background-position: -5% -10%; }
      20%  { background-position: -15% 5%; }
      30%  { background-position: 7% -25%; }
      40%  { background-position: -5% 25%; }
      50%  { background-position: -15% 10%; }
      60%  { background-position: 15% 0%; }
      70%  { background-position: 0 15%; }
      80%  { background-position: 3% 35%; }
      90%  { background-position: -10% 10%; }
      100% { background-position: 0 0; }
    }

    /* ── DARK VIGNETTE ────────────────────────────────── */
    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 11;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
    }

    /* ── LABEL OVERLAYS ───────────────────────────────── */
    #label-left,
    #label-right {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 30;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #label-left {
      left: 36px;
    }

    #label-right {
      right: 36px;
      text-align: right;
      align-items: flex-end;
    }

    .label-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }

    .label-word {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 400;
      color: rgba(255,255,255,0.85);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .label-word em {
      font-style: italic;
      color: rgba(255,255,255,0.45);
    }

    /* ── HERO HEADLINE ────────────────────────────────── */
    #hero {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 48px;
      pointer-events: none;
      gap: 10px;
    }

    #headline {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 5.5vw, 5.5rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.95);
      letter-spacing: -0.03em;
      line-height: 1.0;
      text-align: center;
      text-shadow: 0 2px 40px rgba(0,0,0,0.5);
    }

    #subline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.6rem, 1.1vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      text-align: center;
    }

    /* ── WORDMARK ─────────────────────────────────────── */
    #wordmark {
      position: fixed;
      top: 28px;
      right: 36px;
      z-index: 100;
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
      mix-blend-mode: screen;
    }

    /* ── SCROLL PROGRESS BAR ──────────────────────────── */
    #progress-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 1px;
      width: 0%;
      background: rgba(255,255,255,0.25);
      z-index: 100;
      transition: width 0.1s linear;
    }

    /* ── SCROLL HINT ──────────────────────────────────── */
    #scroll-hint {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 90;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    #scroll-hint-text {
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    #scroll-hint-arrow {
      width: 1px;
      height: 24px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
      animation: hint-bob 2s ease-in-out infinite;
    }

    @keyframes hint-bob {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50% { transform: translateY(4px); opacity: 0.5; }
    }

    /* ── CTA ──────────────────────────────────────────── */
    #cta-wrapper {
      position: fixed;
      bottom: 52px;
      right: 52px;
      z-index: 100;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    #cta-wrapper.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    #cta {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #000;
      text-decoration: none;
      background: rgba(255,255,255,0.95);
      padding: 16px 32px;
      border-radius: 100px;
      cursor: none;
      transition: background 0.25s ease, letter-spacing 0.25s ease;
    }

    #cta:hover {
      background: #fff;
      letter-spacing: 0.22em;
    }

    #cta-arrow {
      font-size: 12px;
      transition: transform 0.3s ease;
    }

    #cta:hover #cta-arrow {
      transform: translateX(3px);
    }

    /* ── DRAG ZONE ────────────────────────────────────── */
    #drag-zone {
      position: fixed;
      inset: 0;
      z-index: 55;
      pointer-events: none;
    }

    #drag-zone.active {
      pointer-events: all;
      cursor: none;
    }

    /* ── CHOICE MOMENT ────────────────────────────────── */
    #choice-prompt {
      position: fixed;
      inset: 0;
      z-index: 60;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #choice-inner {
      text-align: center;
    }

    #choice-text {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.2rem, 2.5vw, 2rem);
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.04em;
      text-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    /* ── VIDEO ELEMENTS ──────────────────────────────── */
    .video-layer video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── IMAGE LAYERS ─────────────────────────────────── */
    .img-layer {
      position: absolute;
      inset: -8%; /* oversized for parallax room */
      width: 116%;
      height: 116%;
      background-size: cover;
      background-position: center;
      will-change: transform;
    }

    .img-left {
      background-image: url('image_left.jpg');
      animation: slow-pan-left 18s ease-in-out infinite alternate;
    }

    .img-right {
      background-image: url('image_right.jpg');
      animation: slow-pan-right 22s ease-in-out infinite alternate;
    }

    @keyframes slow-pan-left {
      0%   { transform: scale(1.08) translate(0%, 0%); }
      100% { transform: scale(1.12) translate(-2%, -1.5%); }
    }

    @keyframes slow-pan-right {
      0%   { transform: scale(1.1) translate(0%, 0%); }
      100% { transform: scale(1.08) translate(1.5%, 1%); }
    }

    /* Warm color grade for left (chaotic) */
    #video-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(80, 40, 0, 0.22);
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    /* Cool tint for right (calm/Sancho) */
    #video-right::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 20, 40, 0.18);
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    /* ── SCROLL-DRIVEN REVEAL ─────────────────────────── */
    /* At 0% scroll: split = 50/50
       As scroll progresses: left clips down to 20%
       At end: right expands to 100% */

  </style>
</head>
<body>

<!-- Film grain SVG filter (not visible, just referenced) -->
<svg id="grain-filter" aria-hidden="true">
  <defs>
    <filter id="noise-filter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay"/>
    </filter>
  </defs>
</svg>

<!-- Wordmark -->
<div id="wordmark">Sancho</div>

<!-- Custom cursor -->
<div id="cursor-line"></div>
<div id="cursor-dot"></div>

<!-- Grain + vignette overlays -->
<div id="grain-overlay"></div>
<div id="vignette"></div>

<!-- Hero headline -->
<div id="hero">
  <div id="headline">Two versions of today.</div>
  <div id="subline">Drag to choose.</div>
</div>

<!-- Side labels -->
<div id="label-left">
  <div class="label-eyebrow">Without Sancho</div>
  <div class="label-word">Everything<br><em>waiting.</em></div>
</div>

<div id="label-right">
  <div class="label-eyebrow">With Sancho</div>
  <div class="label-word">Everything<br><em>handled.</em></div>
</div>

<!-- Scene: two clipped videos -->
<div id="scene">

  <!-- LEFT — chaotic desk (video with image fallback) -->
  <div class="video-layer" id="video-left">
    <video autoplay muted loop playsinline id="vid-left">
      <source src="video_left.mp4" type="video/mp4" />
    </video>
    <!-- Fallback: shown if video fails -->
    <div class="img-layer img-left" id="fallback-left" style="display:none;" role="img" aria-label="Chaotic desk without Sancho"></div>
  </div>

  <!-- RIGHT — calm organized desk (video with image fallback) -->
  <div class="video-layer" id="video-right">
    <video autoplay muted loop playsinline id="vid-right">
      <source src="video_right.mp4" type="video/mp4" />
    </video>
    <div class="img-layer img-right" id="fallback-right" style="display:none;" role="img" aria-label="Organized desk with Sancho"></div>
  </div>

</div>

<!-- Choice moment overlay -->
<div id="choice-prompt">
  <div id="choice-inner">
    <div id="choice-text">Which version do you want?</div>
  </div>
</div>

<!-- Scroll hint -->
<div id="scroll-hint">
  <div id="scroll-hint-text">Scroll</div>
  <div id="scroll-hint-arrow"></div>
</div>

<!-- Progress bar -->
<div id="progress-bar"></div>

<!-- CTA -->
<div id="cta-wrapper">
  <a href="#" id="cta">Try the other side <span id="cta-arrow">→</span></a>
</div>

<!-- Drag zone (activated after scroll) -->
<div id="drag-zone"></div>

<script>
  gsap.registerPlugin(ScrollTrigger);

  // ─── VIDEO FALLBACK ──────────────────────────────────
  function activateFallback(vidId, fallbackId) {
    const v = document.getElementById(vidId);
    const fb = document.getElementById(fallbackId);
    if (!v || !fb) return;
    const showFallback = () => {
      v.style.display = 'none';
      fb.style.display = 'block';
    };
    v.addEventListener('error', showFallback);
    // Timeout: if video hasn't loaded in 5s, use fallback
    setTimeout(() => { if (v.readyState < 2) showFallback(); }, 5000);
  }
  activateFallback('vid-left',  'fallback-left');
  activateFallback('vid-right', 'fallback-right');

  // ─── STATE ──────────────────────────────────────────
  const state = {
    splitPct: 50,          // 0–100, where divider sits
    phase: 'scroll',       // 'scroll' | 'choice' | 'drag' | 'resolved'
    isDragging: false,
    autoSlideTimer: null,
    mouseX: window.innerWidth / 2,
    mouseY: window.innerHeight / 2,
  };

  // ─── DOM REFS ────────────────────────────────────────
  const $scene       = document.getElementById('scene');
  const $vidLeft     = document.getElementById('video-left');
  const $vidRight    = document.getElementById('video-right');
  const $cursorLine  = document.getElementById('cursor-line');
  const $cursorDot   = document.getElementById('cursor-dot');
  const $headline    = document.getElementById('headline');
  const $subline     = document.getElementById('subline');
  const $scrollHint  = document.getElementById('scroll-hint');
  const $progress    = document.getElementById('progress-bar');
  const $choice      = document.getElementById('choice-prompt');
  const $dragZone    = document.getElementById('drag-zone');
  const $cta         = document.getElementById('cta-wrapper');
  const $labelLeft   = document.getElementById('label-left');
  const $labelRight  = document.getElementById('label-right');

  // ─── SPLIT CONTROL ───────────────────────────────────
  function setSplit(pct) {
    state.splitPct = pct;
    const cssVal = pct + '%';
    document.documentElement.style.setProperty('--split', cssVal);

    // Also update cursor line position
    gsap.set($cursorLine, { x: (pct / 100) * window.innerWidth });

    // Fade label overlays based on how far we've dragged
    const leftStrength  = Math.max(0, (40 - pct) / 35);  // shows when left shrinks below 40%
    const rightStrength = Math.max(0, (pct - 60) / 35);  // shows when right expands past 60%
    gsap.set($labelLeft,  { opacity: leftStrength });
    gsap.set($labelRight, { opacity: rightStrength });
  }

  // ─── CURSOR TRACKING ─────────────────────────────────
  window.addEventListener('mousemove', (e) => {
    state.mouseX = e.clientX;
    state.mouseY = e.clientY;

    gsap.to($cursorDot, {
      x: e.clientX,
      y: e.clientY,
      duration: 0.1,
      ease: 'power2.out',
    });

    // During drag phase: cursor line follows mouse
    if (state.phase === 'drag' && !state.isDragging) {
      gsap.to($cursorLine, {
        x: e.clientX,
        duration: 0.15,
        ease: 'power2.out',
      });
    }
  });

  // ─── VIRTUAL SCROLL ENGINE ───────────────────────────
  // We use a fake scroll to drive the split reveal:
  // 0 → 0.5: nothing (viewing the split)
  // 0.5 → 0.85: split slowly shifts from 50% to 25% (right world taking over)
  // 0.85 → 1.0: lock, show choice prompt, activate drag

  let targetVScroll = 0;
  let currentVScroll = 0;
  const VIRTUAL_MAX = 1200; // px of virtual scroll travel
  let scrollLocked = false;
  let choiceTriggered = false;

  window.addEventListener('wheel', (e) => {
    if (scrollLocked) return;
    e.preventDefault();
    targetVScroll = Math.max(0, Math.min(VIRTUAL_MAX, targetVScroll + e.deltaY * 0.75));
  }, { passive: false });

  let touchStartY = 0;
  window.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (scrollLocked) return;
    const dy = touchStartY - e.touches[0].clientY;
    touchStartY = e.touches[0].clientY;
    targetVScroll = Math.max(0, Math.min(VIRTUAL_MAX, targetVScroll + dy));
  }, { passive: true });

  function applyVScroll(v) {
    const pct = v / VIRTUAL_MAX; // 0..1

    // Update progress bar
    $progress.style.width = (pct * 100) + '%';

    // Hide scroll hint after first scroll
    if (v > 30) {
      $scrollHint.style.opacity = '0';
    } else {
      $scrollHint.style.opacity = '1';
    }

    // Phase 1 (0 → 0.45): hold at 50/50, just watch
    if (pct < 0.45) {
      setSplit(50);
      return;
    }

    // Phase 2 (0.45 → 0.88): split shifts right — right world expands
    if (pct < 0.88) {
      const t = (pct - 0.45) / (0.88 - 0.45); // 0..1
      // Ease: right side grows from 50% to 72%
      const easedT = 1 - Math.pow(1 - t, 3); // cubic ease out
      const splitVal = 50 - easedT * 22; // 50 → 28% (left shrinks)
      setSplit(splitVal);

      // Fade headline: shrink as we get deeper
      const headlineOpacity = Math.max(0.15, 1 - t * 0.7);
      gsap.set([$headline, $subline], { opacity: headlineOpacity });
      return;
    }

    // Phase 3 (0.88+): lock, trigger choice moment
    setSplit(28);
    if (!choiceTriggered) {
      choiceTriggered = true;
      triggerChoiceMoment();
    }
  }

  // ─── RAF LOOP ────────────────────────────────────────
  function rafLoop() {
    currentVScroll += (targetVScroll - currentVScroll) * 0.07;
    if (Math.abs(currentVScroll - targetVScroll) < 0.02) currentVScroll = targetVScroll;
    applyVScroll(currentVScroll);
    requestAnimationFrame(rafLoop);
  }
  rafLoop();

  // ─── CHOICE MOMENT ───────────────────────────────────
  function triggerChoiceMoment() {
    scrollLocked = true;
    state.phase = 'choice';

    // Show choice prompt
    gsap.to($choice, { opacity: 1, duration: 0.9, ease: 'power2.inOut' });

    // Pulse the divider line (cursor-line flicker)
    gsap.to($cursorLine, {
      opacity: 0,
      duration: 0.12,
      yoyo: true,
      repeat: 5,
      ease: 'none',
      onComplete: () => {
        gsap.set($cursorLine, { opacity: 1 });
        // Activate drag after flicker
        setTimeout(() => {
          state.phase = 'drag';
          activateDrag();
          startAutoSlide();
        }, 400);
      }
    });
  }

  // ─── DRAG MECHANIC ───────────────────────────────────
  function activateDrag() {
    $dragZone.classList.add('active');

    let isDragging = false;
    let dragStartX = 0;
    let dragStartSplit = state.splitPct;

    $dragZone.addEventListener('mousedown', (e) => {
      isDragging = true;
      state.isDragging = true;
      dragStartX = e.clientX;
      dragStartSplit = state.splitPct;
      clearAutoSlide();
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const newSplit = dragStartSplit + (dx / window.innerWidth) * 100;
      setSplit(Math.max(5, Math.min(95, newSplit)));

      // Move cursor line with drag
      gsap.set($cursorLine, { x: (state.splitPct / 100) * window.innerWidth });
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        state.isDragging = false;

        // Snap decision
        if (state.splitPct > 60) {
          resolveRight();
        } else if (state.splitPct < 40) {
          resolveLeft();
        }
        // If in between: start auto-slide
        else {
          startAutoSlide();
        }
      }
    });

    // Touch
    $dragZone.addEventListener('touchstart', (e) => {
      isDragging = true;
      state.isDragging = true;
      dragStartX = e.touches[0].clientX;
      dragStartSplit = state.splitPct;
      clearAutoSlide();
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - dragStartX;
      const newSplit = dragStartSplit + (dx / window.innerWidth) * 100;
      setSplit(Math.max(5, Math.min(95, newSplit)));
      gsap.set($cursorLine, { x: (state.splitPct / 100) * window.innerWidth });
    }, { passive: true });

    window.addEventListener('touchend', () => {
      if (isDragging) {
        isDragging = false;
        state.isDragging = false;
        if (state.splitPct > 60) resolveRight();
        else if (state.splitPct < 40) resolveLeft();
        else startAutoSlide();
      }
    });
  }

  // ─── AUTO-SLIDE: Sancho decides ──────────────────────
  function startAutoSlide() {
    clearAutoSlide();
    state.autoSlideTimer = setTimeout(() => {
      // Sancho quietly takes the right side
      gsap.to($choice, { opacity: 0, duration: 0.5 });
      animateSplitTo(95, resolveRight);
    }, 4200);
  }

  function clearAutoSlide() {
    if (state.autoSlideTimer) {
      clearTimeout(state.autoSlideTimer);
      state.autoSlideTimer = null;
    }
  }

  function animateSplitTo(targetPct, callback) {
    const obj = { pct: state.splitPct };
    gsap.to(obj, {
      pct: targetPct,
      duration: 2.0,
      ease: 'power3.inOut',
      onUpdate: () => {
        setSplit(obj.pct);
        gsap.set($cursorLine, { x: (obj.pct / 100) * window.innerWidth });
      },
      onComplete: callback,
    });
  }

  // ─── RESOLVE: RIGHT WINS ─────────────────────────────
  function resolveRight() {
    state.phase = 'resolved';

    gsap.to($choice, { opacity: 0, duration: 0.4 });
    gsap.to($cursorLine, { opacity: 0, duration: 0.6 });
    gsap.to($cursorDot, { opacity: 0, duration: 0.4 });

    // Right video expands to full width
    const obj = { pct: state.splitPct };
    gsap.to(obj, {
      pct: 0,
      duration: 1.2,
      ease: 'power3.out',
      onUpdate: () => {
        setSplit(obj.pct);
        document.documentElement.style.setProperty('--split', obj.pct + '%');
      },
    });

    // Labels fade out
    gsap.to([$labelLeft, $labelRight], { opacity: 0, duration: 0.5 });

    // Fade headline back in — clean, minimal
    gsap.to($headline, { opacity: 0.9, duration: 1.2, delay: 0.6 });
    gsap.to($subline, { opacity: 0, duration: 0.4 });

    // Show CTA
    setTimeout(() => {
      $cta.classList.add('visible');
    }, 900);

    // Re-enable scroll (for any further content)
    scrollLocked = false;
  }

  // ─── RESOLVE: LEFT (snap back) ───────────────────────
  function resolveLeft() {
    // User chose the chaos side — gently pull them back
    gsap.to($choice, { opacity: 0, duration: 0.3 });

    setTimeout(() => {
      gsap.to($choice, { opacity: 1, duration: 0.6 });
    }, 400);

    animateSplitTo(28, () => {
      startAutoSlide();
    });
  }

  // ─── ENTRANCE ANIMATION ──────────────────────────────
  gsap.set([$headline, $subline, '#wordmark'], { opacity: 0 });
  gsap.set($scene, { opacity: 0 });

  const entryTl = gsap.timeline({ delay: 0.3 });
  entryTl
    .to($scene, { opacity: 1, duration: 1.4, ease: 'power2.out' })
    .to($headline, { opacity: 1, duration: 1.0, ease: 'power1.out' }, '-=0.8')
    .to($subline,  { opacity: 1, duration: 0.8, ease: 'power1.out' }, '-=0.5')
    .to('#wordmark', { opacity: 0.5, duration: 0.6 }, '-=0.4');

  // Initial cursor line position
  gsap.set($cursorLine, { x: window.innerWidth / 2 });
  gsap.set($cursorDot,  { x: window.innerWidth / 2, y: window.innerHeight / 2 });

  // ─── WINDOW RESIZE ───────────────────────────────────
  window.addEventListener('resize', () => {
    setSplit(state.splitPct);
    gsap.set($cursorLine, { x: (state.splitPct / 100) * window.innerWidth });
  });

</script>
</body>
</html>
